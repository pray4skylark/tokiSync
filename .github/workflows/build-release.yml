name: Build and Deploy (Dev & Prod)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "webpack.core.config.cjs"
      - "vite.config.js"
      - ".github/workflows/**"
  release:
    types: [published]

permissions:
  contents: write # 릴리스 자산 업로드 및 배포를 위해 필요
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v3에서 v4로 업그레이드 (Node 20 환경 최적화)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm" # npm 캐시 활성화로 빌드 속도 향상

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Prepare Distribution Directory
        run: |
          mkdir -p ./deploy_dist
          cp -r docs/* ./deploy_dist/
          cp google_app_script/TokiSync_Server_Bundle.gs ./deploy_dist/

      - name: Deploy Dev to gh-pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy_dist
          destination_dir: dev
          keep_files: true

      - name: Deploy Stable to gh-pages
        if: github.event_name == 'release'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy_dist
          keep_files: true
